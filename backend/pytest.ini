[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Excluir por defeito testes que requerem infra externa (PostgreSQL, broker real).
# Para correr testes de integração: pytest -m integration (requer docker-compose.test.yml up)
addopts = -m "not integration and not e2e and not mqtt_broker"
markers =
    e2e: testes end-to-end que requerem Mosquitto real
    unit: testes unitários com mocks
    integration: testes de integração que requerem PostgreSQL via docker-compose.test.yml
    mqtt_broker: testes de load MQTT que requerem broker real acessível
