# alembic.ini — JFA_Unify
# NOTA: sqlalchemy.url é deixado em branco intencionalmente.
# env.py lê a variável de ambiente DATABASE_URL em runtime.
# Nunca colocar credenciais neste ficheiro.

[alembic]
# Localização dos scripts de migração
script_location = alembic

# Prefixo para ficheiros de migração gerados automaticamente
file_template = %%(rev)s_%%(slug)s

# Codificação do ficheiro de migração
output_encoding = utf-8

# URL da base de dados — sobrescrita por env.py via DATABASE_URL
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
