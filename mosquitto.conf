# Configuração Mosquitto — ambiente de desenvolvimento
# ATENÇÃO: allow_anonymous=true apenas para dev. Em produção usar TLS + autenticação.

listener 1883
allow_anonymous true

# Listener TLS (opcional em dev — requer certificados)
# listener 8883
# cafile /mosquitto/config/ca.crt
# certfile /mosquitto/config/server.crt
# keyfile /mosquitto/config/server.key
# require_certificate false

# Persistência de mensagens
persistence true
persistence_location /mosquitto/data/

# Logs
log_dest stdout
log_type all
