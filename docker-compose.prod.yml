version: '3.8'

services:
  # PostgreSQL Database (Production)
  postgres:
    image: postgres:15-alpine
    container_name: jfa_unify_postgres
    environment:
      POSTGRES_DB: jfa_unify
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGTZ: 'UTC'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - jfa_unify_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: jfa_unify_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - jfa_unify_net
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # MQTT Broker (Mosquitto)
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: jfa_unify_mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-h", "localhost", "-t", "$SYS/broker/status"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - jfa_unify_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: jfa_unify_backend
    environment:
      DEBUG: "false"
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/jfa_unify
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: 1883
      TUYA_ACCESS_ID: ${TUYA_ACCESS_ID}
      TUYA_ACCESS_SECRET: ${TUYA_ACCESS_SECRET}
      TUYA_REGION: ${TUYA_REGION}
      SECRET_KEY: ${SECRET_KEY}
      SUITE_INTEGRATION_ENABLED: ${SUITE_INTEGRATION_ENABLED}
      SUITE_BASE_URL: ${SUITE_BASE_URL}
      SUITE_API_TOKEN: ${SUITE_API_TOKEN}
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - jfa_unify_net
    volumes:
      - ./backend/logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # SvelteKit Frontend (PWA)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: jfa_unify_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      PUBLIC_API_URL: ${PUBLIC_API_URL}
      ORIGIN: ${FRONTEND_ORIGIN}
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - jfa_unify_net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Nginx Reverse Proxy (optional, for load balancing)
  nginx:
    image: nginx:latest
    container_name: jfa_unify_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - jfa_unify_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  mosquitto_data:
    driver: local
  mosquitto_logs:
    driver: local

networks:
  jfa_unify_net:
    driver: bridge
