# Mosquitto produção — Fase 1: rede interna unify-net apenas (sem portas públicas)
# Fase 2 TLS: adicionar listener 8883 + cafile/certfile/keyfile

listener 1883
# Fase 1: anónimo OK (container não tem porta pública, só acessível internamente)
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
